<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>당신의 게이더를 믿으세요</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #ec4899;
            --accent-glow: rgba(236, 72, 153, 0.3);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Pretendard', -apple-system, sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        h1 {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 30px;
            color: var(--text-main);
            text-shadow: 0 0 10px var(--accent-glow);
        }

        h1 span {
            color: var(--accent);
        }

        .quiz-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .nickname {
            font-size: 0.85rem;
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .statement {
            font-size: 1.2rem;
            font-weight: 500;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .options {
            display: flex;
            gap: 12px;
        }

        .btn-option {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid transparent;
            color: var(--text-main);
            padding: 14px;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-option:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* 선택되었을 때 스타일 */
        .btn-option.selected[data-value="O"] {
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
        }

        .btn-option.selected[data-value="X"] {
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
        }

        .submit-box {
            margin-top: 30px;
            text-align: center;
        }

        .btn-submit {
            background: var(--accent);
            color: white;
            border: none;
            padding: 16px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 14px var(--accent-glow);
            transition: transform 0.2s;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
        }

        #result {
            display: none;
            text-align: center;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            border: 2px solid var(--accent);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎯 당신의 <span>게이더</span>를 믿으세요</h1>
    
    <div class="quiz-card" style="margin-bottom: 30px;">
        <label style="display:block; margin-bottom:10px; color:var(--text-muted);">닉네임을 입력해주세요</label>
        <input type="text" id="playerName" placeholder="닉네임 입력" style="width:100%; padding:12px; box-sizing:border-box; background:rgba(0,0,0,0.2); border:1px solid rgba(255,255,255,0.1); color:white; border-radius:8px;">
    </div>

    <div id="quiz-container">Loading...</div>

    <div class="submit-box">
        <button class="btn-submit" onclick="submitAnswers()">결과 확인하기</button>
    </div>

    <div id="result" style="margin-top: 30px;">
        <h2>게임 결과</h2>
        <p id="score-text" style="font-size: 1.5rem; font-weight: bold; margin: 20px 0;"></p>
        <p style="color: var(--text-muted);">당신의 판단 결과가 저장되었습니다.</p>
    </div>
</div>

<script>
    // 입력해주신 구글 앱스 스크립트 웹앱 주소 유지
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwUiRcepdn1Aln6u-48O304xtw2Npd8NjD5tEGbDMlER5ZBvpuSbQk304PcCLOEm94R/exec"; 

    let quizData = [];

    // 1. 구글 시트에서 데이터 가져오기
    async function loadQuiz() {
        try {
            // 브라우저 캐싱 방지를 위해 timestamp 추가 및 redirect 대응
            const response = await fetch(`${GAS_URL}?action=getQuiz&_ts=${Date.now()}`);
            if (!response.ok) throw new Error('Network response was not ok');
            quizData = await response.json();
            renderQuiz();
        } catch (e) {
            console.error(e);
            document.getElementById('quiz-container').innerText = "데이터를 불러오는 데 실패했습니다. 구글 앱스 스크립트 배포 설정(모든 사용자 권한)을 확인해 주세요.";
        }
    }

    // 2. 화면에 퀴즈 렌더링
    function renderQuiz() {
        const container = document.getElementById('quiz-container');
        container.innerHTML = '';

        if(quizData.length === 0) {
            container.innerText = "가져올 퀴즈 데이터가 없습니다.";
            return;
        }

        quizData.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'quiz-card';
            card.innerHTML = `
                <div class="nickname">FROM. ${item.nickname}</div>
                <div class="statement">"${item.statement}"</div>
                <div class="options">
                    <button class="btn-option" data-index="${index}" data-value="O" onclick="selectOption(this)">O</button>
                    <button class="btn-option" data-index="${index}" data-value="X" onclick="selectOption(this)">X</button>
                </div>
            `;
            container.appendChild(card);
        });
    }

    // 3. O, X 버튼 선택 핸들러
    function selectOption(button) {
        const index = button.getAttribute('data-index');
        const parent = button.parentElement;
        
        parent.querySelectorAll('.btn-option').forEach(btn => btn.classList.remove('selected'));
        button.classList.add('selected');
        
        quizData[index].userAnswer = button.getAttribute('data-value');
    }

    // 4. 채점 및 결과 제출 (사용자에게 점수 비공개)
    async function submitAnswers() {
        const playerName = document.getElementById('playerName').value.trim();
        if(!playerName) {
            alert('닉네임을 입력해주세요!');
            return;
        }

        // 모든 문항에 답을 했는지 검증
        const unanswered = quizData.some(item => !item.userAnswer);
        if (unanswered) {
            alert('모든 문항의 O, X를 선택해주세요!');
            return;
        }

        let score = 0;
        let total = quizData.length;

        // 내부 점수 계산
        quizData.forEach(item => {
            if(item.userAnswer === item.correctAnswer) {
                score++;
            }
        });

        // UI에 먼저 완료 상태 표시
        document.getElementById('score-text').innerText = `제출이 완료되었습니다!`;
        document.getElementById('result').style.display = 'block';
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });

        // 정적인 gh-pages 브랜치 환경에서 CORS 처리가 매끄럽도록 URLSearchParams 구성 보강
        try {
            await fetch(GAS_URL, {
                method: "POST",
                mode: "no-cors", // GitHub Pages 환경에서 오류 없이 패스를 넘기기 위한 보안 모드 설정
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: new URLSearchParams({
                    action: "saveResult",
                    name: playerName,
                    score: `${score}/${total}`
                })
            });
        } catch(e) {
            console.error("결과 전송 중 예외 발생:", e);
        }
    }

    // 초기 로드
    window.onload = loadQuiz;
</script>
</body>
</html>
